spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://localhost:3306/omnitrade-user-service?useSSL=false&serverTimezone=UTC
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQL8Dialect
          format_sql: true

server:
  port: 8081
